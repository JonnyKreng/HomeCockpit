esphome:
  includes:
    - addon/solar-chart.h
    - addon/theme.h
  on_boot:
    then:
      - delay: 1sec
      - lambda: |-
            draw_chart(id(overview_tab)/*.obj*/);

globals:
  # Define a global variable as a vector with type float.
  - id: chart_values
    type: std::vector<float>

interval:
  - interval: 300s
    startup_delay: 10sec
    then:
      - lambda: |-
          float value = 0;
          int counter = id(chart_values).size();
          for(int i = 0; i < counter; i++) {
            value += id(chart_values).back();
            id(chart_values).pop_back();
          }
          float average = value / counter;
          ESP_LOGD("Interval", "Average is %f, count is %i", average, counter); 
          update_chart(average);

# interval:
