sensor:
  - platform: homeassistant
    entity_id: sensor.steckdose_nr_3_power
    force_update: True
    id: solar_power
    on_value:
      lambda: |-
        id(chart_values).insert(id(chart_values).begin(), x);
        ESP_LOGD("Interval", "Pushed value to vector %f", x); 