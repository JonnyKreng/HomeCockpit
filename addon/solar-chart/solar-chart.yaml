esphome:
  includes:
    - addon/script-extensions/theme.h
    - addon/script-extensions/chart.h
    - addon/solar-chart/solar-chart.h
  on_boot:
    then:
      - delay: 1sec
      - lambda: |-
          chart_home_instance = draw_solar_chart(id(chart_ancor_widget));
          chart_solar_instance = draw_solar_chart(id(solar_chart_anchor));
  platformio_options:
    build_flags:
      - -D LV_USE_CHART=1

globals:
  - id: chart_values
    type: std::vector<float>

interval:
  - interval: 300s
    startup_delay: 10sec
    then:
      - lambda: |-
          float value = 0;
          int counter = id(chart_values).size();
          for(int i = 0; i < counter; i++) {
            value += id(chart_values).back();
            id(chart_values).pop_back();
          }
          float average = value / counter;
          
          update_chart(chart_home_instance, average);
          update_chart(chart_solar_instance, average);

sensor:
  - platform: homeassistant
    entity_id: sensor.steckdose_nr_3_power
    force_update: True
    id: solar_power
    on_value:
      lambda: |-
        id(chart_values).insert(id(chart_values).begin(), x);

        char buf[16];
        snprintf(buf, sizeof(buf), "%.0f W", x);
        lv_label_set_text(id(solar_power_label), buf);
        lv_label_set_text(id(solar_power_label_solar_tab), buf);

  - platform: homeassistant
    entity_id: sensor.steckdose_pv_solarstrom_heute
    force_update: True
    id: solar_delivered
    on_value:
      lambda: |-
        char buf[16];
        snprintf(buf, sizeof(buf), "%.1f kWh", x);
        lv_label_set_text(id(solar_delivered_label), buf);
        lv_label_set_text(id(solar_delivered_label_solar_tab), buf);
