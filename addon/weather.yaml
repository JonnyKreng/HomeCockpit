esphome:
  includes:
    - addon/script-extensions/theme.h
    - addon/script-extensions/weather_colors.h

text_sensor:
  - platform: homeassistant
    entity_id: sensor.weather_forecast_hour_0600_condition
    id: wx_cond_0600
    on_value:
      lambda: |-
        const char* i = "\U000F0590";
        if (x == "sunny") i = "\U000F0599";
        else if (x == "clear-night") i = "\U000F0594";
        else if (x == "partlycloudy") i = "\U000F0595";
        else if (x == "rainy") i = "\U000F0597";
        else if (x == "pouring") i = "\U000F0596";
        else if (x == "snowy") i = "\U000F0598";
        else if (x == "snowy-rainy") i = "\U000F067F";
        else if (x == "lightning") i = "\U000F0593";
        else if (x == "lightning-rainy") i = "\U000F067E";
        else if (x == "fog") i = "\U000F0591";
        else if (x == "windy") i = "\U000F059D";
        else if (x == "hail") i = "\U000F0592";
        lv_label_set_text(id(wx_icon_0600), i);
        lv_obj_set_style_text_color(id(wx_icon_0600), weather_icon_color(x), LV_PART_MAIN);

