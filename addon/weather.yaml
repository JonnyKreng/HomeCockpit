sensor:
  - platform: homeassistant
    entity_id: weather.forecast_home
    attribute: temperature
    id: current_weather_temp
    on_value:
      lambda: |-
        char buf[8];
        snprintf(buf, sizeof(buf), "%.0f°", x);
        lv_label_set_text(id(current_weather_temp_label), buf);

