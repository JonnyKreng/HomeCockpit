globals:
  - id: bad_arc_updating
    type: bool
    initial_value: 'false'
  - id: bad_dropdown_updating
    type: bool
    initial_value: 'false'
  - id: schlafzimmer_arc_updating
    type: bool
    initial_value: 'false'
  - id: schlafzimmer_dropdown_updating
    type: bool
    initial_value: 'false'
  - id: essecke_arc_updating
    type: bool
    initial_value: 'false'
  - id: essecke_dropdown_updating
    type: bool
    initial_value: 'false'
  - id: balkon_arc_updating
    type: bool
    initial_value: 'false'
  - id: balkon_dropdown_updating
    type: bool
    initial_value: 'false'

sensor:

  # ── Bathroom (Bad) ─────────────────────────────────────────────────────────
  - platform: homeassistant
    entity_id: climate.bad_sonoff_trvzb_thermostat
    attribute: current_temperature
    id: bad_current_temp
    on_value:
      lambda: |-
        char buf[10];
        snprintf(buf, sizeof(buf), "~%.1f°", x);
        lv_label_set_text(id(bad_current_label), buf);

  - platform: homeassistant
    entity_id: climate.bad_sonoff_trvzb_thermostat
    attribute: temperature
    id: bad_target_temp
    on_value:
      lambda: |-
        char buf[8];
        snprintf(buf, sizeof(buf), "%.0f°", x);
        lv_label_set_text(id(bad_target_label), buf);
        id(bad_arc_updating) = true;
        lv_arc_set_value(id(bad_arc), (int)x);
        id(bad_arc_updating) = false;

  # ── Bedroom (Schlafzimmer) ─────────────────────────────────────────────────
  - platform: homeassistant
    entity_id: climate.schlafzimmer_sonoff_trvzb_thermostat
    attribute: current_temperature
