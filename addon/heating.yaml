      lambda: |-
        char buf[10];
        snprintf(buf, sizeof(buf), "~%.1f°", x);
        lv_label_set_text(id(schlafzimmer_current_label), buf);

  - platform: homeassistant
    entity_id: climate.schlafzimmer_sonoff_trvzb_thermostat
    attribute: temperature
    id: schlafzimmer_target_temp
    on_value:
      lambda: |-
        char buf[8];
        snprintf(buf, sizeof(buf), "%.0f°", x);
        lv_label_set_text(id(schlafzimmer_target_label), buf);
        id(schlafzimmer_arc_updating) = true;
        lv_arc_set_value(id(schlafzimmer_arc), (int)x);
        id(schlafzimmer_arc_updating) = false;

  # ── Living room — Essecke ──────────────────────────────────────────────────
  - platform: homeassistant
    entity_id: climate.essecke_sonoff_trvzb_thermostat
    attribute: current_temperature
    id: essecke_current_temp
    on_value:
      lambda: |-
        char buf[10];
        snprintf(buf, sizeof(buf), "~%.1f°", x);
        lv_label_set_text(id(essecke_current_label), buf);

  - platform: homeassistant
    entity_id: climate.essecke_sonoff_trvzb_thermostat
    attribute: temperature
    id: essecke_target_temp
    on_value:
      lambda: |-
        char buf[8];
        snprintf(buf, sizeof(buf), "%.0f°", x);
        lv_label_set_text(id(essecke_target_label), buf);
        id(essecke_arc_updating) = true;
        lv_arc_set_value(id(essecke_arc), (int)x);
        id(essecke_arc_updating) = false;

  # ── Living room — Balkon ───────────────────────────────────────────────────
  - platform: homeassistant
    entity_id: climate.balkon_sonoff_trvzb_thermostat
    attribute: current_temperature
    id: balkon_current_temp
    on_value:
