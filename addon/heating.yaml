text_sensor:

  # ── Bathroom (Bad) ─────────────────────────────────────────────────────────
  - platform: homeassistant
    entity_id: climate.bad_sonoff_trvzb_thermostat
    id: bad_hvac_mode
    on_value:
      lambda: |-
        id(bad_dropdown_updating) = true;
        lv_dropdown_set_selected(id(bad_mode_dropdown)->obj, x == "off" ? 0 : 1);
        id(bad_dropdown_updating) = false;

  # ── Bedroom (Schlafzimmer) ─────────────────────────────────────────────────
  - platform: homeassistant
    entity_id: climate.schlafzimmer_sonoff_trvzb_thermostat
