lvgl:
  displays: my_display
  byte_order: little_endian
  
  top_layer:
    widgets:
      # Clock
      - label:
          text: "--:--"
          id: display_time
          text_font: clockbar_font
          align: top_mid
          x: 0
          y: 8
          text_align: center
          text_color: $text_color

      - label:
          text: "\uF1EB"
          id: lbl_hastatus
          hidden: true
          align: top_right
          x: -2
          y: 7
          text_align: right
          text_color: $text_color
          
  pages:
    widgets:
        - tabview:
            id: lv_tabview_0
            pad_top: 42
            pad_bottom: 5
            pad_left: 5
            pad_right: 5
            width: 100%
            height: 100%
            bg_color: Black
            bg_opa: cover

            position: top
            size: 8%

            tab_style:
              border_width: 0
              bg_color: $background_color

              items:
                text_color: $text_color
                text_font: icon_font_34

                checked:
                  bg_color: $primary_color
                  text_color: $text_color
                  border_color: $heighlight_color
                  bg_opa: cover
                  radius: $widget_radius

            tabs:
              - <<: !include dashboards/home.yaml
              - <<: !include dashboards/solar.yaml
              