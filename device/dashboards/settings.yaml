name: $settings_helper
id: settings_tab
layout:
  type: grid
  grid_columns: [194, 194, 194, 194, 194]
  grid_rows: [157, 324]
  pad_row: 10
  pad_column: 10
width: 100%
height: 100%
bg_color: Black
bg_opa: cover
pad_all: 0
pad_top: 10

widgets:
  - obj:
      grid_cell_column_pos: 0
      grid_cell_row_pos: 0
      grid_cell_column_span: 2
      grid_cell_row_span: 2
      styles: widget_double
      align: center
      scrollbar_mode: "off"
      widgets:
        - label:
            text_font: label_font
            align: top_left
            text: WiFi
            text_color: $text_color
        - qrcode:
            size: 310
            align: center
            light_color: whitesmoke
            text: WIFI:T:WPA2;S:SomeRandomWifi;P:66481235399507917161;H:false;;
            
            