name: $home_icon
id: overview_tab
layout:
  type: grid
  grid_columns: [194, 194, 194, 194, 194]
  grid_rows: [157, 157, 157]
  pad_row: 10
  pad_column: 10
width: 100%
height: 100%
bg_color: $background_color
bg_opa: cover
pad_all: 0
pad_top: 10

widgets:

  # ── Row 0 ──────────────────────────────────────────────────────────────────

  # Current Weather  [col 0, row 0]
  - obj:
      id: current_weather_widget
      grid_cell_column_pos: 0
      grid_cell_row_pos: 0
      widgets:
        - label:
            id: current_weather_icon
            text_font: icon_font
            align: top_left
            text: "\U000F0590"
            text_color: $text_color
        - label:
            id: current_weather_temp_label
            x: 0
            y: 70
            text: "-- °C"
            text_font: statistics_font
            text_color: $text_color

  # Spacer            [col 1, row 0]
  - obj:
      styles: placeholder_widget
      grid_cell_column_pos: 1
      grid_cell_row_pos: 0

  # People at home   [col 2, row 0]
  - obj:
      id: people_at_home_widget
      grid_cell_column_pos: 2
      grid_cell_row_pos: 0
      scrollbar_mode: "off"
      layout:
        type: flex
        flex_flow: row
        flex_align_main: space_around
        flex_align_cross: center
      widgets:
        - obj:
            bg_opa: transp
            border_width: 0
            pad_all: 0
            width: 80px
            height: 129px
            widgets:
              - label:
                  id: person_jonny_icon
                  text_font: $icon_font
                  text: $male_icon
                  text_color: $text_color
        - obj:
            bg_opa: transp
            border_width: 0
            pad_all: 0
            width: 80px
            height: 129px
            widgets:
              - label:
                  id: person_saskia_icon
                  text_font: $icon_font
                  text: $female_icon
                  text_color: $text_color

  # Solar Power      [col 3, row 0]
  - obj:
      id: solar_power_widget
      grid_cell_column_pos: 3
      grid_cell_row_pos: 0
      scrollbar_mode: "off"
      widgets:
        - label:
            text_font: $icon_font
            align: top_left
            text: $solar_power_icon
            text_color: $text_color
        - label:
            id: solar_power_label
            x: 0
            y: 70
            text: "-- W"
            text_font: statistics_font
            text_color: $text_color

  # Solar Delivered  [col 4, row 0]
  - obj:
      id: solar_delivered_widget
      grid_cell_column_pos: 4
      grid_cell_row_pos: 0
      scrollbar_mode: "off"
      widgets:
        - label:
            text_font: $icon_font
            align: top_left
            text: $solar_power_icon
            text_color: $text_color
        - label:
            id: solar_delivered_label
            x: 0
            y: 70
            text: "-- kWh"
            text_font: statistics_font
            text_color: $text_color

  # ── Row 1 ──────────────────────────────────────────────────────────────────

  # Weather forecast [col 0-1, row 1]
  - obj:
      id: weather_widget
      grid_cell_column_pos: 0
      grid_cell_row_pos: 1
      grid_cell_column_span: 2
      scrollbar_mode: "off"
      layout:
        type: flex
        flex_flow: row
        flex_align_main: space_evenly
        flex_align_cross: center
      widgets:
        - obj:
            id: wx_col_0600
            bg_opa: transp
            border_width: 0
            pad_all: 0px
            width: 54px
            height: 129px
            scrollbar_mode: "off"
            layout:
              type: flex
              flex_flow: column
              flex_align_cross: center
              flex_align_main: center
            widgets:
              - label:
                  text: "06:00"
                  text_color: $text_color
                  text_font: clockbar_font
              - label:
                  id: wx_icon_0600
                  text_font: icon_font_34
                  text_color: $text_color
                  text: "\U000F0590"
              - label:
                  id: wx_temp_label_0600
                  text: "--°"
                  text_font: label_font
                  text_color: $text_color

        - obj:
            id: wx_col_0900
            bg_opa: transp
            border_width: 0
            pad_all: 0px
            width: 54px
            height: 129px
            scrollbar_mode: "off"
            layout:
              type: flex
              flex_flow: column
              flex_align_cross: center
              flex_align_main: center
            widgets:
              - label:
                  text: "09:00"
                  text_color: $text_color
                  text_font: clockbar_font
              - label:
                  id: wx_icon_0900
                  text_font: icon_font_34
                  text_color: $text_color
                  text: "\U000F0590"
              - label:
                  id: wx_temp_label_0900
                  text: "--°"
                  text_font: label_font
                  text_color: $text_color

        - obj:
            id: wx_col_1200
            bg_opa: transp
            border_width: 0
            pad_all: 0px
            width: 54px
            height: 129px
            scrollbar_mode: "off"
            layout:
              type: flex
              flex_flow: column
              flex_align_cross: center
              flex_align_main: center
            widgets:
              - label:
                  text: "12:00"
                  text_color: $text_color
                  text_font: clockbar_font
              - label:
                  id: wx_icon_1200
                  text_font: icon_font_34
                  text_color: $text_color
                  text: "\U000F0590"
              - label:
                  id: wx_temp_label_1200
                  text: "--°"
                  text_font: label_font
                  text_color: $text_color

        - obj:
            id: wx_col_1500
            bg_opa: transp
            border_width: 0
            pad_all: 0px
            width: 54px
            height: 129px
            scrollbar_mode: "off"
            layout:
              type: flex
              flex_flow: column
              flex_align_cross: center
              flex_align_main: center
            widgets:
              - label:
                  text: "15:00"
                  text_color: $text_color
                  text_font: clockbar_font
              - label:
                  id: wx_icon_1500
                  text_font: icon_font_34
                  text_color: $text_color
                  text: "\U000F0590"
              - label:
                  id: wx_temp_label_1500
                  text: "--°"
                  text_font: label_font
                  text_color: $text_color

        - obj:
            id: wx_col_1800
            bg_opa: transp
            border_width: 0
            pad_all: 0px
            width: 54px
            height: 129px
            scrollbar_mode: "off"
            layout:
              type: flex
              flex_flow: column
              flex_align_cross: center
              flex_align_main: center
            widgets:
              - label:
                  text: "18:00"
                  text_color: $text_color
                  text_font: clockbar_font
              - label:
                  id: wx_icon_1800
                  text_font: icon_font_34
                  text_color: $text_color
                  text: "\U000F0590"
              - label:
                  id: wx_temp_label_1800
                  text: "--°"
                  text_font: label_font
                  text_color: $text_color

        - obj:
            id: wx_col_2100
            bg_opa: transp
            border_width: 0
            pad_all: 0px
            width: 54px
            height: 129px
            scrollbar_mode: "off"
            layout:
              type: flex
              flex_flow: column
              flex_align_cross: center
              flex_align_main: center
            widgets:
              - label:
                  text: "21:00"
                  text_color: $text_color
                  text_font: clockbar_font
              - label:
                  id: wx_icon_2100
                  text_font: icon_font_34
                  text_color: $text_color
                  text: "\U000F0590"
              - label:
                  id: wx_temp_label_2100
                  text: "-- °C"
                  text_font: label_font
                  text_color: $text_color

  # Spacer            [col 2, row 1]
  - obj:
      styles: placeholder_widget
      grid_cell_column_pos: 2
      grid_cell_row_pos: 1

  # Chart anchor     [col 3-4, row 1-2]
  - obj:
      id: chart_ancor_widget
      grid_cell_column_pos: 3
      grid_cell_row_pos: 1
      grid_cell_column_span: 2
      grid_cell_row_span: 2
      pad_all: 0
      scrollbar_mode: "off"
      styles: placeholder_double

  # ── Row 2 ──────────────────────────────────────────────────────────────────

  # Car Session kWh  [col 0, row 2]
  - obj:
      id: home_charge_session_widget
      grid_cell_column_pos: 0
      grid_cell_row_pos: 2
      scrollbar_mode: "off"
      widgets:
        - label:
            id: home_charge_session_icon
            text_font: $icon_font
            align: top_left
            text: "\U000F0079"
            text_color: $text_color
        - label:
            id: home_charge_session_pct_label
            align: top_right
            text: "--%"
            text_font: label_font
            text_color: $text_color
        - label:
            id: home_charge_session_label
            x: 0
            y: 70
            text: "-- kWh"
            text_font: statistics_font
            text_color: $text_color

  # Spacer            [col 1, row 2]
  - obj:
      styles: placeholder_widget
      grid_cell_column_pos: 1
      grid_cell_row_pos: 2

  # Spacer            [col 2, row 2]
  - obj:
      styles: placeholder_widget
      grid_cell_column_pos: 2
      grid_cell_row_pos: 2
