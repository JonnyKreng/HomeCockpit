name: $home_icon
id: overview_tab
layout: 
  type: flex
  flex_flow: row_wrap
  pad_row: 10
  pad_column: 10
width: 100%
height: 100%
bg_color: $background_color
bg_opa: cover
pad_all: 0
pad_top: 10

widgets:
  # Current Weather
  - obj:
      id: current_weather_widget
      widgets:
        - label:
            id: current_weather_icon
            text_font: icon_font
            align: top_left
            text: "\U000F0590"
            text_color: $text_color
        - label:
            id: current_weather_temp_label
            x: 0
            y: 70
            text: "-- °C"
            text_font: statistics_font
            text_color: $text_color

  - obj:
      styles: placeholder_widget

  - obj:
      id: people_at_home_widget
      scrollbar_mode: "off"
      layout:
        type: flex
        flex_flow: row
        flex_align_main: space_around
        flex_align_cross: center
      widgets:
        - label:
            id: person_jonny_icon
            text_font: $icon_font
            align: center
            text: $male_icon
            text_color: $text_color
        - label:
            id: person_saskia_icon
            text_font: $icon_font
            align: center
            text: $female_icon
            text_color: $text_color

  # Solar Power
  - obj:
      id: solar_power_widget
      scrollbar_mode: "off"
      widgets:
        - label:
            text_font: $icon_font
            align: top_left
            text: $solar_power_icon
            text_color: $text_color
        - label:
            id: solar_power_label
            x: 0
            y: 70
            text: "-- W"
            text_font: statistics_font
            text_color: $text_color

  - obj:
      id: solar_delivered_widget
      scrollbar_mode: "off"
      widgets:
        - label:
            text_font: $icon_font
            align: top_left
            text: $solar_power_icon
            text_color: $text_color
        - label:
            id: solar_delivered_label
            x: 0
            y: 70
            text: "-- kWh"
            text_font: statistics_font
            text_color: $text_color     

  # Weather hourly forecast
  - obj:
      id: weather_widget
      styles: widget_double_width
      scrollbar_mode: "off"
      layout:
        type: flex
        flex_flow: row
        flex_align_main: space_evenly
        flex_align_cross: center
      widgets:
        - obj:
            id: wx_col_0600
            bg_opa: transp
            border_width: 0
            pad_all: 0px
            width: 54px
            height: 129px
            scrollbar_mode: "off"
            layout:
              type: flex
              flex_flow: column
              flex_align_cross: center
              flex_align_main: center
            widgets:
              - label:
                  text: "06:00"
                  text_color: $text_color
                  text_font: clockbar_font
              - label:
                  id: wx_icon_0600
                  text_font: icon_font_34
                  text_color: $text_color
                  text: "\U000F0590"
              - label:
                  id: wx_temp_label_0600
                  text: "--°"
                  text_font: label_font
                  text_color: $text_color

        - obj:
