  # Solar Power
  - obj:
      id: solar_power_widget
      styles: widget_half
      scrollbar_mode: "off"
      widgets:
        - label:
            text_font: $icon_font
            align: left_mid
            text: $solar_power_icon
            text_color: $text_color
        - label:
            id: solar_power_label
            align: right_mid
            text: "-- W"
            text_font: big_label_font
            text_color: $text_color

  # Current Weather
  - obj:
      id: current_weather_widget
      widgets:
        - label:
            id: current_weather_icon
            text_font: icon_font
            align: top_left
            text: "\U000F0590"
            text_color: $text_color
        - label:
            id: current_weather_temp_label
            align: center
            text: "-- °C"
            text_font: statistics_font
            text_color: $text_color
        - label:
            id: current_weather_condition_label
            align: bottom_left
            text: "--"
            text_font: label_font
            text_color: $text_color

  # Weather hourly forecast
  - obj:
      id: weather_widget
      styles: widget_double_width
      scrollbar_mode: "off"
      layout:
        type: flex
        flex_flow: row
        flex_align_main: space_evenly
        flex_align_cross: center
      widgets:
        - obj:
            id: wx_col_0600
            bg_opa: transp
            border_width: 0
            pad_all: 0px
            width: 54px
            height: 129px
            scrollbar_mode: "off"
            layout:
              type: flex
              flex_flow: column
              flex_align_cross: center
              flex_align_main: center
            widgets:
              - label:
                  text: "06:00"
                  text_color: $text_color
                  text_font: clockbar_font
              - label:
                  id: wx_icon_0600
                  text_font: icon_font_34
                  text_color: $text_color
                  text: "\U000F0590"
              - label:
                  id: wx_temp_label_0600
                  text: "--°"
                  text_font: label_font
                  text_color: $text_color

        - obj:
