name: Solar
id: solar_tab
layout: 
  type: flex
  flex_flow: column_wrap
  pad_row: 10
  pad_column: 10
width: 100%
bg_color: Black
bg_opa: cover

widgets:
  - button: 
        height: $button_height
        width: $button_width
        checkable: true
        id: office_scene_evening_button2
        styles: control
        widgets:
          - label:
              text_font: $icon_font
              align: top_left
              id: office_scene_evening_icon2         
              text: $nightlight
          - label:
              align: bottom_left
              id: office_scene_evening_label2
              text: "Evening"
