name: $solart_panel_icon
id: solar_tab
layout: 
  type: flex
  flex_flow: row_wrap
  pad_row: 10
  pad_column: 10
width: 100%
height: 100%
bg_color: Black
bg_opa: cover
pad_all: 0
pad_top: 10

widgets:
  # Solar Power
  - obj:
      id: solar_power_widget_solar_tab
      scrollbar_mode: "off"
      widgets:
        - label:
            text_font: $icon_font
            align: top_left
            text: $solar_power_icon
            text_color: $text_color
        - label:
            id: solar_power_label_solar_tab
            x: 0
            y: 70
            text: "-- W"
            text_font: statistics_font
            text_color: $text_color

  - obj:
      id: solar_delivered_widget_solar_tab
      scrollbar_mode: "off"
      widgets:
        - label:
            text_font: $icon_font
            align: top_left
            text: $solar_power_icon
            text_color: $text_color
        - label:
            id: solar_delivered_label_solar_tab
            x: 0
            y: 70
            text: "-- kWh"
            text_font: statistics_font
            text_color: $text_color


  - obj:
      styles: placeholder_widget
  - obj:
      styles: placeholder_widget
  - obj:
      styles: placeholder_widget