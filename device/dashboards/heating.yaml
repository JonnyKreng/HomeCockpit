name: $radiator_icon
id: heating_tab
layout:
  type: grid
  grid_columns: [194, 194, 194, 194, 194]
  grid_rows: [157, 157, 157]
  pad_row: 10
  pad_column: 10
width: 100%
height: 100%
bg_color: $background_color
bg_opa: cover
pad_all: 0
pad_top: 10

widgets:

  # ── Bathroom (Bad) — col 0, rows 0-2 ───────────────────────────────────────
  - obj:
      id: bad_thermostat_widget
      grid_cell_column_pos: 0
      grid_cell_row_pos: 0
      grid_cell_row_span: 3
      scrollbar_mode: "off"
      widgets:

        - label:
            text: "Bad"
            text_font: label_font
            text_color: $text_color
            align: top_left

        - arc:
            id: bad_arc
            align: top_mid
            y: 55
            width: 130
            height: 130
            min_value: 5
            max_value: 30
            value: 20
            on_value:
              - if:
                  condition:
                    lambda: return !id(bad_arc_updating);
                  then:
                    - lambda: |-
                        char buf[8];
                        snprintf(buf, sizeof(buf), "%d°", x);
                        lv_label_set_text(id(bad_target_label), buf);
                    - homeassistant.service:
                        service: climate.set_temperature
                        data:
                          entity_id: climate.bad_sonoff_trvzb_thermostat
                        data_template:
                          temperature: !lambda return std::to_string(x);

        - label:
            id: bad_target_label
            align: top_mid
            y: 92
            text: "--°"
            text_font: big_label_font
            text_color: $text_color

        - label:
            id: bad_current_label
            align: top_mid
            y: 135
            text: "~--°"
            text_font: clockbar_font
            text_color: $text_color

        - button:
            align: top_mid
            x: -36
            y: 200
            styles: thermostat_ctrl_btn
            on_click:
              - lambda: lv_arc_set_value(id(bad_arc), lv_arc_get_value(id(bad_arc)) - 1);
            widgets:
              - label:
                  text: "-"
                  align: center
                  text_font: label_font
                  text_color: $text_color

        - button:
            align: top_mid
            x: 36
            y: 200
            styles: thermostat_ctrl_btn
            on_click:
              - lambda: lv_arc_set_value(id(bad_arc), lv_arc_get_value(id(bad_arc)) + 1);
            widgets:
              - label:
                  text: "+"
                  align: center
                  text_font: label_font
                  text_color: $text_color

        - dropdown:
            id: bad_mode_dropdown
            align: bottom_mid
            y: -10
            width: 100%
            options:
              - "Aus"
              - "Heizen"
            on_value:
              - if:
                  condition:
                    lambda: return !id(bad_dropdown_updating);
                  then:
                    - homeassistant.service:
                        service: climate.set_hvac_mode
                        data:
                          entity_id: climate.bad_sonoff_trvzb_thermostat
                        data_template:
                          hvac_mode: !lambda |-
                            return x == 0 ? std::string("off") : std::string("heat");

