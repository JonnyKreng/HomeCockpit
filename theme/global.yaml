substitutions:
  icon_font: icon_font
  background_color: "0x000000"
  primary_color: "0x313131"
  heighlight_color: "0xFF8C00"
  text_color: "0xFFFFFF"
  widget_height: 157px
  widget_width: 194px
  widget_padding: 14px
  widget_radius: 8px
  widget_height_half: 73px
  widget_height_double: 324px
  widget_width_double: 398px

esphome:
  platformio_options:
    build_flags:
      - "-DTHEME_BACKGROUND=$background_color"
      - "-DTHEME_PRIMARY=$primary_color"
      - "-DTHEME_HIGHLIGHT=$heighlight_color"
      - "-DTHEME_TEXT=$text_color"