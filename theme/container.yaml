lvgl:
  style_definitions:
    - id: widget_half
      height: $widget_height_half
      pad_all: 8px

    - id: widget_double_height
      height: $widget_height_double

    - id: widget_double_width
      width: $widget_width_double

    - id: widget_double
      height: $widget_height_double
      width: $widget_width_double

    - id: widget_two_by_three
      height: $widget_height_double
      width: $widget_width_tripple


    - id: placeholder_widget
      bg_opa: transp

    - id: placeholder_double_height
      bg_opa: transp
      height: $widget_height_double

    - id: placeholder_double_width
      bg_opa: transp
      width: $widget_width_double

    - id: placeholder_double
      bg_opa: transp
      height: $widget_height_double
      width: $widget_width_double

  theme:
    obj:
      bg_color: $primary_color
      bg_opa: cover
      radius: $widget_radius
      width: $widget_width
      height: $widget_height
      pad_all: $widget_padding
      shadow_width: 0
      border_width: 0
      text_color: $text_color
      scrollbar_mode: "off"
      grid_cell_x_align: stretch
      grid_cell_y_align: stretch
